(function () {
  const urlLang = new URLSearchParams(window.location.search).get("lang");
  let lang = (urlLang && T_PP[urlLang]) ? urlLang
             : (localStorage.getItem("uiLanguage") || "ru");
  if (!T_PP[lang]) lang = "ru";

  function apply(l) {
    document.documentElement.lang = l;
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const val = T_PP[l]?.[el.dataset.i18n] || T_PP.en?.[el.dataset.i18n] || "";
      if (val) el.innerHTML = val;
    });
    document.title = T_PP[l].pp_title + " — Selection Translate AI";
    document.querySelectorAll(".lang-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.lang === l));
  }

  apply(lang);

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      lang = btn.dataset.lang;
      localStorage.setItem("uiLanguage", lang);
      apply(lang);
    });
  });

  // Nav scroll shadow
  const nav = document.getElementById("nav");
  window.addEventListener("scroll", () => {
    nav.classList.toggle("scrolled", window.scrollY > 10);
  }, { passive: true });
})();
</script>
